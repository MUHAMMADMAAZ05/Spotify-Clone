<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Music List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <ul>

                <img src="./covers/1.jpg" alt="1">
                <span class="songName">Let me Love You</span>

            <div class="songItem">
                <img src="./covers/1.jpg" alt="1">
                <span class="songName">Let me Love You</span>
                <span class="songListPlay"><span class="timestamp">05:34<i id="2" class="fa-solid songItemPlay fa-circle-play"></i></span></span>
            </div>
            <div class="songItem">
                <img src="./covers/1.jpg" alt="1">

        </div>
        <div class="songBanner"></div>

     <div class="bottom">
        <input type="range" name="range" id="myProgressBar" min="0" value="0" max="100">
        <div class="icons">
            <!-- fontawesome icons -->
            <i class="fa-solid fa-2x fa-backward" id="previous"></i>
            <i class="fa-solid fa-2x fa-play-circle" id="masterPlay"></i>
            <i class="fa-solid fa-2x fa-forward" id="next"></i>
        </div>
        <div class="songInfo">
            <img src="./accets/playing.gif" width="34px" alt="" id="gif"><span id="masterSongName">Warriyo - Mortals [NCS Release]</span>
        </div>
     </div>

     <script src="https://kit.fontawesome.com/3bc56d8811.js" crossorigin="anonymous"></script>
